<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D无限地形射击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 顶部UI */
        .ui-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            padding-top: calc(15px + env(safe-area-inset-top));
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            z-index: 999;
            background: rgba(0,0,0,0.4);
        }
        /* 左下角摇杆 */
        .joystick {
            position: fixed;
            left: 20px;
            bottom: calc(80px + env(safe-area-inset-bottom));
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 999;
        }
        .joystick-thumb {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: rgba(30,144,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(30,144,255,0.7);
        }
        /* 右下角按钮 */
        .shoot-btn {
            position: fixed;
            right: 25px;
            bottom: calc(80px + env(safe-area-inset-bottom));
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(255,68,68,0.9);
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            z-index: 999;
            box-shadow: 0 0 15px rgba(255,68,68,0.7);
        }
        .reload-btn {
            position: fixed;
            right: 25px;
            bottom: calc(180px + env(safe-area-inset-bottom));
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255,215,0,0.9);
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            z-index: 999;
        }
        /* 小屏适配 */
        @media (max-width: 380px) {
            .joystick {
                width: 110px;
                height: 110px;
                left: 12px;
                bottom: calc(60px + env(safe-area-inset-bottom));
            }
            .joystick-thumb {
                width: 45px;
                height: 45px;
            }
            .shoot-btn {
                width: 75px;
                height: 75px;
                right: 12px;
                bottom: calc(60px + env(safe-area-inset-bottom));
            }
            .reload-btn {
                width: 55px;
                height: 55px;
                right: 12px;
                bottom: calc(150px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="ui-top">
        <div>血量: <span id="hpText">100</span></div>
        <div>击杀: <span id="killText">0</span></div>
        <div>弹药: <span id="ammoText">30/90</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="joystick" id="joystick">
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>

    <button class="reload-btn" id="reloadBtn">换弹</button>
    <button class="shoot-btn" id="shootBtn">射击</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script>
        // ====================== 1. 基础配置 ======================
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        // 相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
        // 渲染器
        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true,
            alpha: false
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        // 天空颜色
        scene.background = new THREE.Color(0x87CEEB);

        // ====================== 2. 灯光 ======================
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(20, 40, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.6));

        // ====================== 3. 无限地形核心配置 ======================
        const CHUNK_SIZE = 64; // 单个区块大小
        const RENDER_DISTANCE = 2; // 渲染距离（玩家周围n个区块）
        const chunks = new Map(); // 已加载的区块 Map<"x,y", 区块数据>
        const obstacles = []; // 当前激活的障碍物（带碰撞）
        // 噪声生成器（固定种子，保证地形一致）
        function simpleNoise(x, y) {
            x = x * 0.01;
            y = y * 0.01;
            let X = Math.floor(x) & 255;
            let Y = Math.floor(y) & 255;
            x -= Math.floor(x);
            y -= Math.floor(y);
            const u = x * x * x * (x * (x * 6 - 15) + 10);
            const v = y * y * y * (y * (y * 6 - 15) + 10);
            const p = new Array(512);
            const perm = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
            for (let i=0; i<256; i++) p[256+i] = p[i] = perm[i];
            const A = p[X] + Y, AA = p[A], AB = p[A + 1];
            const B = p[X + 1] + Y, BA = p[B], BB = p[B + 1];

            function lerp(a, b, t) { return a + t * (b - a); }
            function grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }
            return lerp(
                lerp(grad(p[AA], x, y), grad(p[BA], x - 1, y), u),
                lerp(grad(p[AB], x, y - 1), grad(p[BB], x - 1, y - 1), u),
                v
            );
        }

        // ====================== 4. 无限地形区块管理 ======================
        // 世界坐标转区块坐标
        function worldToChunk(worldX, worldZ) {
            return {
                x: Math.floor(worldX / CHUNK_SIZE),
                z: Math.floor(worldZ / CHUNK_SIZE)
            };
        }
        // 生成区块ID
        function getChunkId(chunkX, chunkZ) {
            return `${chunkX},${chunkZ}`;
        }

        // 生成单个区块（地面+障碍物）
        function generateChunk(chunkX, chunkZ) {
            const chunkId = getChunkId(chunkX, chunkZ);
            if (chunks.has(chunkId)) return chunks.get(chunkId);

            const chunk = {
                id: chunkId,
                x: chunkX,
                z: chunkZ,
                worldX: chunkX * CHUNK_SIZE,
                worldZ: chunkZ * CHUNK_SIZE,
                ground: null,
                obstacles: []
            };

            // 1. 生成地面
            const groundGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
            // 用噪声生成地面颜色，实现草地纹理变化
            const groundMat = new THREE.MeshLambertMaterial({ 
                color: 0x3a7f50,
                flatShading: false
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.set(chunk.worldX + CHUNK_SIZE/2, 0, chunk.worldZ + CHUNK_SIZE/2);
            ground.receiveShadow = true;
            scene.add(ground);
            chunk.ground = ground;

            // 2. 生成障碍物（树/石头，噪声固定位置）
            const obsCount = 8 + Math.floor(Math.abs(simpleNoise(chunkX * 10, chunkZ * 10)) * 8);
            for (let i=0; i<obsCount; i++) {
                // 用噪声固定障碍物位置，同区块永远一致
                const rx = simpleNoise(chunkX * 100 + i, chunkZ * 100);
                const rz = simpleNoise(chunkX * 100 + i, chunkZ * 100 + 50);
                const type = Math.abs(simpleNoise(chunkX * 100 + i, chunkZ * 100 + 100)) > 0.5 ? 'tree' : 'rock';
                
                const worldX = chunk.worldX + rx * CHUNK_SIZE;
                const worldZ = chunk.worldZ + rz * CHUNK_SIZE;
                const size = type === 'tree' ? 3 + Math.random() * 2 : 2 + Math.random() * 1.5;

                // 障碍物模型
                let mesh;
                if (type === 'tree') {
                    // 树干+树冠
                    const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, size * 2);
                    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.set(worldX, size, worldZ);
                    trunk.castShadow = true;
                    
                    const leavesGeo = new THREE.SphereGeometry(size * 0.8);
                    const leavesMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.set(worldX, size * 2 + size * 0.4, worldZ);
                    leaves.castShadow = true;

                    // 合并为一个组
                    const treeGroup = new THREE.Group();
                    treeGroup.add(trunk);
                    treeGroup.add(leaves);
                    scene.add(treeGroup);
                    mesh = treeGroup;
                } else {
                    // 石头
                    const rockGeo = new THREE.DodecahedronGeometry(size);
                    const rockMat = new THREE.MeshLambertMaterial({ color: 0x696969 });
                    mesh = new THREE.Mesh(rockGeo, rockMat);
                    mesh.position.set(worldX, size/2, worldZ);
                    mesh.castShadow = true;
                    scene.add(mesh);
                }

                // 碰撞盒
                const collider = {
                    x: worldX - size/2,
                    z: worldZ - size/2,
                    width: size,
                    depth: size
                };

                chunk.obstacles.push({
                    mesh: mesh,
                    type: type,
                    size: size,
                    collider: collider
                });
            }

            chunks.set(chunkId, chunk);
            return chunk;
        }

        // 更新区块加载/卸载
        function updateChunks(playerX, playerZ) {
            const currentChunk = worldToChunk(playerX, playerZ);
            const activeChunkIds = new Set();

            // 加载周围区块
            for (let x = currentChunk.x - RENDER_DISTANCE; x <= currentChunk.x + RENDER_DISTANCE; x++) {
                for (let z = currentChunk.z - RENDER_DISTANCE; z <= currentChunk.z + RENDER_DISTANCE; z++) {
                    const chunkId = getChunkId(x, z);
                    activeChunkIds.add(chunkId);
                    generateChunk(x, z);
                }
            }

            // 卸载超出范围的区块
            for (const [chunkId, chunk] of chunks.entries()) {
                if (!activeChunkIds.has(chunkId)) {
                    // 移除地面
                    scene.remove(chunk.ground);
                    chunk.ground.geometry.dispose();
                    chunk.ground.material.dispose();
                    // 移除障碍物
                    chunk.obstacles.forEach(obs => {
                        scene.remove(obs.mesh);
                        if (obs.mesh.geometry) obs.mesh.geometry.dispose();
                        if (obs.mesh.material) {
                            if (Array.isArray(obs.mesh.material)) {
                                obs.mesh.material.forEach(m => m.dispose());
                            } else {
                                obs.mesh.material.dispose();
                            }
                        }
                    });
                    chunks.delete(chunkId);
                }
            }

            // 更新当前激活的障碍物列表（用于碰撞检测）
            obstacles.length = 0;
            for (const chunk of chunks.values()) {
                obstacles.push(...chunk.obstacles);
            }
        }

        // ====================== 5. 玩家核心数据 ======================
        const player = {
            x: 0,
            y: 1.7, // 眼睛高度
            z: 0,
            yaw: 0, // 左右旋转
            pitch: 0, // 上下旋转
            speed: 0.15,
            hp: 100,
            maxHp: 100,
            ammo: 30,
            maxAmmo: 30,
            spareAmmo: 90
        };
        camera.position.set(player.x, player.y, player.z);
        let killCount = 0;
        let isGameOver = false;

        // ====================== 6. 多指触摸系统（修复摇杆反向） ======================
        const touchMap = new Map();
        // 摇杆数据
        const joystickData = {
            active: false,
            centerX: 0,
            centerY: 0,
            maxDist: 50,
            moveX: 0,
            moveY: 0
        };
        // 视角数据
        const lookData = {
            active: false,
            lastX: 0,
            lastY: 0,
            sensitivity: 0.003
        };
        // 射击数据
        let shootTimer = null;
        let isShooting = false;

        // 触摸开始
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const touches = e.changedTouches;

            for (let i=0; i<touches.length; i++) {
                const touch = touches[i];
                const id = touch.identifier;
                const target = touch.target;

                if (target.id === 'joystick' || target.id === 'joystickThumb') {
                    touchMap.set(id, 'joystick');
                    const rect = joystick.getBoundingClientRect();
                    joystickData.centerX = rect.left + rect.width/2;
                    joystickData.centerY = rect.top + rect.height/2;
                    joystickData.active = true;
                } else if (target.id === 'shootBtn') {
                    touchMap.set(id, 'shoot');
                    startShoot();
                } else if (target.id === 'reloadBtn') {
                    touchMap.set(id, 'reload');
                    reload();
                } else {
                    touchMap.set(id, 'look');
                    lookData.active = true;
                    lookData.lastX = touch.clientX;
                    lookData.lastY = touch.clientY;
                }
            }
        });

        // 触摸移动（核心修复：摇杆反向）
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const touches = e.changedTouches;

            for (let i=0; i<touches.length; i++) {
                const touch = touches[i];
                const id = touch.identifier;
                const type = touchMap.get(id);
                if (!type) continue;

                if (type === 'joystick') {
                    const dx = touch.clientX - joystickData.centerX;
                    const dy = touch.clientY - joystickData.centerY;
                    const dist = Math.hypot(dx, dy);
                    const scale = dist > joystickData.maxDist ? joystickData.maxDist / dist : 1;

                    joystickData.moveX = dx * scale;
                    joystickData.moveY = dy * scale;
                    joystickThumb.style.transform = `translate(calc(-50% + ${joystickData.moveX}px), calc(-50% + ${joystickData.moveY}px))`;
                }

                if (type === 'look') {
                    const deltaX = touch.clientX - lookData.lastX;
                    const deltaY = touch.clientY - lookData.lastY;
                    lookData.lastX = touch.clientX;
                    lookData.lastY = touch.clientY;

                    // 视角旋转
                    player.yaw -= deltaX * lookData.sensitivity;
                    player.pitch -= deltaY * lookData.sensitivity;
                    player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));

                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = player.yaw;
                    camera.rotation.x = player.pitch;
                }
            }
        });

        // 触摸结束
        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const touches = e.changedTouches;

            for (let i=0; i<touches.length; i++) {
                const touch = touches[i];
                const id = touch.identifier;
                const type = touchMap.get(id);
                if (!type) continue;

                if (type === 'joystick') {
                    joystickData.active = false;
                    joystickData.moveX = 0;
                    joystickData.moveY = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                }
                if (type === 'look') lookData.active = false;
                if (type === 'shoot') stopShoot();

                touchMap.delete(id);
            }
        });

        // 触摸取消（容错）
        window.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            e.stopPropagation();
            touchMap.clear();
            joystickData.active = false;
            joystickData.moveX = 0;
            joystickData.moveY = 0;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
            lookData.active = false;
            stopShoot();
        });

        // ====================== 7. 电脑端兼容 ======================
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r') reload();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        // 鼠标锁定
        canvas.addEventListener('click', () => canvas.requestPointerLock());
        // 鼠标视角
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === canvas) {
                player.yaw -= e.movementX * 0.002;
                player.pitch -= e.movementY * 0.002;
                player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = player.yaw;
                camera.rotation.x = player.pitch;
            }
        });
        // 鼠标射击
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && document.pointerLockElement === canvas) startShoot();
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) stopShoot();
        });

        // ====================== 8. 子弹系统（修复弹道可视化+命中） ======================
        const bullets = [];
        // 子弹几何体（复用，提升性能）
        const bulletGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8);
        bulletGeo.rotateX(Math.PI / 2); // 旋转为沿Z轴方向
        const bulletMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });

        function shoot() {
            if (player.ammo <= 0 || isGameOver) return;
            player.ammo--;
            updateUI();

            // 子弹方向（和相机视角一致）
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            // 子弹初始位置（相机前方一点，避免贴脸生成）
            const startPos = camera.position.clone().add(direction.clone().multiplyScalar(0.5));

            // 创建3D子弹模型
            const bulletMesh = new THREE.Mesh(bulletGeo, bulletMat);
            bulletMesh.position.copy(startPos);
            bulletMesh.quaternion.copy(camera.quaternion); // 朝向飞行方向
            scene.add(bulletMesh);

            // 子弹数据
            bullets.push({
                mesh: bulletMesh,
                position: startPos,
                direction: direction,
                speed: 1.2,
                damage: 1
            });
        }

        // 开始连射
        function startShoot() {
            if (isGameOver || isShooting) return;
            isShooting = true;
            shoot();
            shootTimer = setInterval(shoot, 150);
        }
        // 停止射击
        function stopShoot() {
            isShooting = false;
            clearInterval(shootTimer);
        }
        // 换弹
        function reload() {
            if (isGameOver || player.ammo === player.maxAmmo || player.spareAmmo <= 0) return;
            const need = player.maxAmmo - player.ammo;
            const add = Math.min(need, player.spareAmmo);
            player.ammo += add;
            player.spareAmmo -= add;
            updateUI();
        }

        // ====================== 9. 敌人AI系统 ======================
        const enemies = [];
        // 敌人生成
        function spawnEnemy() {
            if (isGameOver) return;
            // 在玩家周围20-30单位生成
            const spawnDist = 20 + Math.random() * 10;
            const angle = Math.random() * Math.PI * 2;
            const x = player.x + Math.cos(angle) * spawnDist;
            const z = player.z + Math.sin(angle) * spawnDist;

            // 敌人模型
            const enemyGeo = new THREE.SphereGeometry(0.8);
            const enemyMat = new THREE.MeshLambertMaterial({ color: 0xff3333 });
            const enemyMesh = new THREE.Mesh(enemyGeo, enemyMat);
            enemyMesh.position.set(x, 0.8, z);
            enemyMesh.castShadow = true;
            scene.add(enemyMesh);

            // 敌人数据
            enemies.push({
                mesh: enemyMesh,
                x: x,
                z: z,
                size: 0.8,
                hp: 3,
                speed: 0.05,
                damage: 2
            });
        }
        setInterval(spawnEnemy, 3000);

        // ====================== 10. 碰撞检测系统 ======================
        // 玩家与障碍物碰撞
        function checkPlayerCollision(nextX, nextZ) {
            const playerRadius = 0.5;
            for (const obs of obstacles) {
                const col = obs.collider;
                // 圆柱碰撞检测
                const closestX = Math.max(col.x, Math.min(nextX, col.x + col.width));
                const closestZ = Math.max(col.z, Math.min(nextZ, col.z + col.depth));
                const dx = nextX - closestX;
                const dz = nextZ - closestZ;
                if (Math.hypot(dx, dz) < playerRadius) {
                    return true; // 碰撞
                }
            }
            return false;
        }

        // ====================== 11. 每帧更新逻辑 ======================
        function update() {
            if (isGameOver) return;

            // ========== 1. 无限地形更新 ==========
            updateChunks(player.x, player.z);

            // ========== 2. 玩家移动（彻底修复摇杆反向） ==========
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
            
            // 移动输入
            let moveX = 0, moveZ = 0;
            // 摇杆输入（核心修复：上下反向）
            if (joystickData.active) {
                moveX = joystickData.moveX / joystickData.maxDist;
                moveZ = - (joystickData.moveY / joystickData.maxDist); // 反向修复
            }
            // 键盘输入
            if (keys['w']) moveZ += 1;
            if (keys['s']) moveZ -= 1;
            if (keys['a']) moveX -= 1;
            if (keys['d']) moveX += 1;
            // 归一化，斜走不加速
            if (Math.hypot(moveX, moveZ) > 1) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }

            // 计算下一个位置
            const nextX = player.x + (right.x * moveX + forward.x * moveZ) * player.speed;
            const nextZ = player.z + (right.z * moveX + forward.z * moveZ) * player.speed;

            // 分轴碰撞，贴墙滑动
            if (!checkPlayerCollision(nextX, player.z)) player.x = nextX;
            if (!checkPlayerCollision(player.x, nextZ)) player.z = nextZ;

            // 更新相机位置
            camera.position.set(player.x, player.y, player.z);

            // ========== 3. 子弹更新 ==========
            for (let i = bullets.length-1; i >= 0; i--) {
                const bullet = bullets[i];
                // 子弹移动
                bullet.position.add(bullet.direction.clone().multiplyScalar(bullet.speed));
                bullet.mesh.position.copy(bullet.position);

                // 超出范围销毁
                if (bullet.position.distanceTo(camera.position) > 150) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // 撞障碍物销毁
                let hitObstacle = false;
                for (const obs of obstacles) {
                    const col = obs.collider;
                    const closestX = Math.max(col.x, Math.min(bullet.position.x, col.x + col.width));
                    const closestZ = Math.max(col.z, Math.min(bullet.position.z, col.z + col.depth));
                    if (Math.hypot(bullet.position.x - closestX, bullet.position.z - closestZ) < 0.2) {
                        hitObstacle = true;
                        break;
                    }
                }
                if (hitObstacle) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // 击中敌人
                let hitEnemy = false;
                for (let j = enemies.length-1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (Math.hypot(bullet.position.x - enemy.x, bullet.position.z - enemy.z) < 1) {
                        enemy.hp -= bullet.damage;
                        hitEnemy = true;
                        // 敌人死亡
                        if (enemy.hp <= 0) {
                            scene.remove(enemy.mesh);
                            enemy.mesh.geometry.dispose();
                            enemy.mesh.material.dispose();
                            enemies.splice(j, 1);
                            killCount++;
                            updateUI();
                        }
                        break;
                    }
                }
                if (hitEnemy) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                }
            }

            // ========== 4. 敌人更新 ==========
            for (let i = enemies.length-1; i >= 0; i--) {
                const enemy = enemies[i];
                // 追踪玩家
                const dx = player.x - enemy.x;
                const dz = player.z - enemy.z;
                const dist = Math.hypot(dx, dz);

                // 移动
                if (dist > 1.5) {
                    const moveX = (dx / dist) * enemy.speed;
                    const moveZ = (dz / dist) * enemy.speed;
                    const nextX = enemy.x + moveX;
                    const nextZ = enemy.z + moveZ;

                    // 敌人碰撞
                    let canMove = true;
                    for (const obs of obstacles) {
                        const col = obs.collider;
                        const closestX = Math.max(col.x, Math.min(nextX, col.x + col.width));
                        const closestZ = Math.max(col.z, Math.min(nextZ, col.z + col.depth));
                        if (Math.hypot(nextX - closestX, nextZ - closestZ) < 0.8) {
                            canMove = false;
                            break;
                        }
                    }
                    if (canMove) {
                        enemy.x = nextX;
                        enemy.z = nextZ;
                        enemy.mesh.position.set(enemy.x, 0.8, enemy.z);
                    }
                }

                // 攻击玩家
                if (dist < 1.8) {
                    player.hp -= enemy.damage * 0.05;
                    updateUI();
                    if (player.hp <= 0) gameOver();
                }
            }
        }

        // ====================== 12. UI与游戏状态 ======================
        function updateUI() {
            document.getElementById('hpText').textContent = Math.max(0, Math.round(player.hp));
            document.getElementById('killText').textContent = killCount;
            document.getElementById('ammoText').textContent = `${player.ammo}/${player.spareAmmo}`;
        }

        function gameOver() {
            isGameOver = true;
            stopShoot();
            alert(`游戏结束！\n最终击杀数：${killCount}`);
            window.location.reload();
        }

        // ====================== 13. 窗口适配 ======================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ====================== 14. 渲染主循环 ======================
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();
        updateUI();
    </script>
</body>
</html>
