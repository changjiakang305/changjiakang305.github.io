<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="full-screen" content="yes">
<title>高健魁的一百种喜法之误当杀猪菜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#fff6e0}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:auto}

/* 超大标题 · 永远不会被挡 */
.title{
  width:100%;
  padding:12px 10px;
  text-align:center;
  background:#ff3333;
  color:#fff;
  font-size:clamp(20px, 6vw, 36px);
  font-weight:900;
  text-shadow:2px 2px #000;
  flex-shrink:0;
}

/* 场景容器 · 自适应全屏 */
.scene{
  flex:1;
  display:none;
  padding:16px;
  overflow:auto;
  -webkit-overflow-scrolling:touch
}
.scene.active{display:flex;flex-direction:column}

.content{flex:1;display:flex;flex-direction:column;gap:16px;align-items:center}

.btn{
  padding:14px 20px;
  background:#ff6633;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  width:100%;
  max-width:320px
}
.btn:disabled{background:#ccc}

.progress{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:5px;
  overflow:hidden
}
.progress .bar{
  height:100%;
  background:linear-gradient(to right,#ff9500,#ff3333);
  width:0%
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%
}

.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  text-align:center
}

.icon{font-size:40px}
.big-icon{font-size:80px}
.text-center{text-align:center}
</style>
</head>
<body>

<div id="app">
  <!-- 超大标题 永远置顶 -->
  <div class="title">高健魁的一百种喜法之误当杀猪菜！！！</div>

  <!-- 开场 -->
  <div class="scene active" id="s0">
    <div class="content">
      <div class="big-icon">🐷</div>
      <div class="text-center">
        <h2>高健魁被误当成年猪啦！</h2>
        <p>快来体验完整杀猪菜流程</p>
      </div>
      <button class="btn" onclick="go(1)">开始游戏</button>
    </div>
  </div>

  <!-- 备料 -->
  <div class="scene" id="s1">
    <div class="content">
      <h2>第一步：杀猪备料</h2>
      <div class="progress"><div class="bar" id="p1"></div></div>
      <div class="grid">
        <div class="card">
          <div class="icon">💦</div>
          <p>清洗</p>
          <button class="btn" id="b1_1">点击</button>
        </div>
        <div class="card">
          <div class="icon">✂️</div>
          <p>脱毛</p>
          <button class="btn" id="b1_2" disabled>点击</button>
        </div>
        <div class="card">
          <div class="icon">🔪</div>
          <p>分割</p>
          <button class="btn" id="b1_3" disabled>点击</button>
        </div>
        <div class="card">
          <div class="icon">🥬</div>
          <p>配菜</p>
          <button class="btn" id="b1_4" disabled>点击</button>
        </div>
      </div>
      <button class="btn" id="n1" disabled onclick="go(2)">下一步</button>
    </div>
  </div>

  <!-- 烹饪 -->
  <div class="scene" id="s2">
    <div class="content">
      <h2>第二步：下锅烹饪</h2>
      <div class="progress"><div class="bar" id="p2"></div></div>
      <div class="big-icon">🍲</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
        <span class="icon">🥩</span>
        <span class="icon">🥬</span>
        <span class="icon">🧄</span>
        <span class="icon">🌶️</span>
      </div>
      <button class="btn" id="cook">开始炖煮</button>
      <button class="btn" id="n2" disabled onclick="go(3)">开吃</button>
    </div>
  </div>

  <!-- 开吃 -->
  <div class="scene" id="s3">
    <div class="content">
      <h2>第三步：全家开吃！</h2>
      <div class="progress"><div class="bar" id="p3"></div></div>
      <div class="big-icon">🍲</div>
      <div style="display:flex;gap:12px">👨👩👦👧</div>
      <button class="btn" id="eat">🥢 夹菜</button>
      <button class="btn" id="n3" disabled onclick="go(4)">结局</button>
    </div>
  </div>

  <!-- 结局 -->
  <div class="scene" id="s4">
    <div class="content">
      <div class="big-icon">🎉</div>
      <h2>结局达成！</h2>
      <p class="text-center">高健魁成功变成杀猪菜<br>全家吃得非常满意！</p>
      <button class="btn" onclick="restart()">再来一次</button>
    </div>
  </div>
</div>

<script>
let step = [0,0,0,0]
let p = 0

function go(i){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'))
  document.getElementById('s'+i).classList.add('active')
}

// 备料逻辑
const b1 = document.getElementById('b1_1')
const b2 = document.getElementById('b1_2')
const b3 = document.getElementById('b1_3')
const b4 = document.getElementById('b1_4')
const n1 = document.getElementById('n1')
const p1 = document.getElementById('p1')

b1.onclick = ()=>{step[0]++;upd();if(step[0]>=5)b2.disabled=0}
b2.onclick = ()=>{step[1]++;upd();if(step[1]>=5)b3.disabled=0}
b3.onclick = ()=>{step[2]++;upd();if(step[2]>=5)b4.disabled=0}
b4.onclick = ()=>{step[3]++;upd();if(step[3]>=5)n1.disabled=0}
function upd(){
  let total = step.reduce((a,b)=>a+b,0)
  p1.style.width = Math.min(100, total*5)+'%'
}

// 烹饪
document.getElementById('cook').onclick = ()=>{
  document.getElementById('p2').style.width='100%'
  document.getElementById('n2').disabled=0
}

// 开吃
let eat = 0
document.getElementById('eat').onclick = ()=>{
  eat += 10
  document.getElementById('p3').style.width = Math.min(100,eat)+'%'
  if(eat>=100)document.getElementById('n3').disabled=0
}

// 重开
function restart(){
  step = [0,0,0,0]
  eat = 0
  p1.style.width = p2.style.width = p3.style.width = '0%'
  b1.disabled=0;b2.disabled=b3.disabled=b4.disabled=1
  n1.disabled=n2.disabled=n3.disabled=1
  go(0)
}
</script>
</body>
</html>
