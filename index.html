<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打死高健魁 - 沙包解压小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 15px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .game-desc {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 25px;
            text-align: center;
        }

        .hp-container {
            width: 90%;
            max-width: 600px;
            height: 35px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid white;
        }

        .hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #00C851);
            border-radius: 20px;
            transition: width 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            font-weight: bold;
        }

        .stats-panel {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffbb33;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .game-area {
            width: 90%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.3);
        }

        #sandbag {
            width: 60%;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        #sandbag.hit {
            transform: scale(0.9) rotate(5deg);
        }

        #sandbag.dizzy {
            animation: shake 0.2s ease infinite;
        }

        @keyframes shake {
            0% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            100% { transform: translateX(-5px); }
        }

        .damage-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff4444;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        .quote-text {
            position: absolute;
            top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .quote-text.show {
            opacity: 1;
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .reset-btn {
            background: #ff4444;
            color: white;
        }

        .reset-btn:hover {
            background: #cc0000;
            transform: translateY(-2px);
        }

        .win-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .win-card {
            background: white;
            color: #222;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .win-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff4444;
            margin-bottom: 15px;
        }

        .win-desc {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
    </style>
</head>

            <button class="game-btn reset-btn" onclick="resetGame()">再来一局</button>
        </div>

    <script>
        // 游戏核心参数
        let maxHp = 1000;
        let currentHp = maxHp;
        let score = 0;
        let hitCount = 0;
        let combo = 0;
        let comboTimer = null;
        const hitQuotes = [
            "疼死了！",
            "别打了别打了！",
            "我就是个沙包啊！",
            "你手不疼吗？",
            "服了服了！",
            "轻点轻点！",
            "再打我要扁了！",
            "有完没完啊！"
        ];

        // DOM元素
        const hpBar = document.getElementById('hpBar');
        const scoreEl = document.getElementById('score');
        const hitCountEl = document.getElementById('hitCount');
        const comboEl = document.getElementById('combo');
        const sandbag = document.getElementById('sandbag');
        const quoteText = document.getElementById('quoteText');
        const winMask = document.getElementById('winMask');
        const winStats = document.getElementById('winStats');

        // 初始化
        updateUI();

        // 沙包点击事件
        sandbag.addEventListener('click', (e) => {
            if (currentHp <= 0) return;

            // 击打逻辑
            hitCount++;
            // 随机伤害 10-30，10%概率暴击
            const isCrit = Math.random() < 0.1;
            let damage = Math.floor(Math.random() * 20 + 10);
            if (isCrit) damage *= 2;

            // 扣血
            currentHp = Math.max(0, currentHp - damage);
            score += damage;

            // 连击逻辑
            combo++;
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                comboEl.textContent = combo;
            }, 1000);

            // 击打动画
            sandbag.classList.add('hit');
            setTimeout(() => sandbag.classList.remove('hit'), 100);

            // 伤害数字飘字
            createDamageText(e.clientX, e.clientY, damage, isCrit);

            // 随机挨打语录
            if (Math.random() < 0.3) {
                showQuote();
            }

            // 血量低的时候晃起来
            if (currentHp < maxHp * 0.3) {
                sandbag.classList.add('dizzy');
            }

            // 更新UI
            updateUI();

            // 播放打击音效
            playHitSound(isCrit);

            // 手机震动
            if (navigator.vibrate) {
                navigator.vibrate(isCrit ? 100 : 50);
            }

            // 打死了
            if (currentHp === 0) {
                gameWin();
            }
        });

        // 创建伤害飘字
        function createDamageText(x, y, damage, isCrit) {
            const text = document.createElement('div');
            text.className = 'damage-text';
            text.textContent = isCrit ? `暴击！${damage}` : damage;
            text.style.left = `${x - 30}px`;
            text.style.top = `${y - 20}px`;
            if (isCrit) {
                text.style.color = '#ffbb33';
                text.style.fontSize = '2rem';
            }
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }

        // 显示挨打语录
        function showQuote() {
            quoteText.textContent = hitQuotes[Math.floor(Math.random() * hitQuotes.length)];
            quoteText.classList.add('show');
            setTimeout(() => quoteText.classList.remove('show'), 1000);
        }

        // 更新UI
        function updateUI() {
            const hpPercent = Math.floor((currentHp / maxHp) * 100);
            hpBar.style.width = `${hpPercent}%`;
            hpBar.textContent = `${hpPercent}% 血量`;
            scoreEl.textContent = score;
            hitCountEl.textContent = hitCount;
            comboEl.textContent = combo;
        }

        // 游戏胜利
        function gameWin() {
            clearTimeout(comboTimer);
            sandbag.src = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjUwMCIgdmlld0JveD0iMCAwIDQwMCA1MDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgICA8IS0tIGZsYXQgc2FuZGJhZyAtLT4KICAgIDxlbGxpcHNlIGN4PSIyMDAiIGN5PSIyNTAiIHJ4PSIxODAiIHJ5PSI2MCIgZmlsbD0iI2QzM2YzMyIgc3Ryb2tlPSIjYTIyYjJiIiBzdHJva2Utd2lkdGg9IjQiLz4KICAgIDwhLS0gc3RpdGNoZXMgLS0+CiAgICA8bGluZSB4MT0iNDAiIHkxPSIyMzAiIHgyPSIzNjAiIHkyPSIyMzAiIHN0cm9rZT0iI2EyMmIyYiIgc3Ryb2tlLXdpZHRoPSIzIiBzdHJva2UtZGFzaGFycmF5PSIxMCA1Ii8+CiAgICA8bGluZSB4MT0iNDAiIHkxPSIyNzAiIHgyPSIzNjAiIHkyPSIyNzAiIHN0cm9rZT0iI2EyMmIyYiIgc3Ryb2tlLXdpZHRoPSIzIiBzdHJva2UtZGFzaGFycmF5PSIxMCA1Ii8+CiAgICA8IS0tIGRlYWQgZmFjZSAtLT4KICAgIDxwYXRoIGQ9Ik0xNDAgMjMwIEwxNjAgMjUwIiBzdHJva2U9IiMyMjIiIHN0cm9rZS13aWR0aD0iMyIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgICA8cGF0aCBkPSJNMTYwIDIzMCBMMTQwIDI1MCIgc3Ryb2tlPSIjMjIyIiBzdHJva2Utd2lkdGg9IjMiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogICAgPHBhdGggZD0iTTI0MCAyMzAgTDI2MCAyNTAiIHN0cm9rZT0iIzIyMiIgc3Ryb2tlLXdpZHRoPSIzIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICAgIDxwYXRoIGQ9Ik0yNjAgMjMwIEwyNDAgMjUwIiBzdHJva2U9IiMyMjIiIHN0cm9rZS13aWR0aD0iMyIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgICA8cGF0aCBkPSJNMTgwIDI3MCBRMjAwIDI4MCAyMjAgMjcwIiBzdHJva2U9IiMyMjIiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgc3Ryb2tlLWRhc2hhcnJheT0iMyAzIi8+Cjwvc3ZnPg==";

            winMask.style.display = 'flex';
        }

        // 重置游戏

            score = 0;
            hitCount = 0;
            combo = 0;
            clearTimeout(comboTimer);
            sandbag.src = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjUwMCIgdmlld0JveD0iMCAwIDQwMCA1MDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgICA8IS0tIHRvcCByb3BlIC0tPgogICAgPHBhdGggZD0iTTE4MCAwIEwxODAgNDAgTDIyMCA0MCBMMjIwIDAiIGZpbGw9IiM0NDMzMjIiIHN0cm9rZT0iIzMzMjIxMSIgc3Ryb2tlLXdpZHRoPSIzIi8+CiAgICA8IS0tIHNvZnQgdG9wIC0tPgogICAgPGVsbGlwc2UgY3g9IjIwMCIgY3k9IjYwIiByeD0iOTAiIHJ5PSIzMCIgZmlsbD0iI2QzM2YzMyIgc3Ryb2tlPSIjYTIyYjJiIiBzdHJva2Utd2lkdGg9IjQiLz4KICAgIDwhLS0gbWFpbiBzYW5kYmFnIC0tPgogICAgPHJlY3QgeD0iMTEwIiB5PSI2MCIgd2lkdGg9IjE4MCIgaGVpZ2h0PSIzODAiIHJ4PSI5MCIgcnk9IjkwIiBmaWxsPSIjZDMzZjMzIiBzdHJva2U9IiNhMjJiMmIiIHN0cm9rZS13aWR0aD0iNCIvPgogICAgPCEtLSBzdGl0Y2hlcyAtLT4KICAgIDxsaW5lIHgxPSIxMTAiIHkxPSIxMjAiIHgyPSIyOTAiIHkyPSIxMjAiIHN0cm9rZT0iI2EyMmIyYiIgc3Ryb2tlLXdpZHRoPSIzIiBzdHJva2UtZGFzaGFycmF5PSIxMCA1Ii8+CiAgICA8bGluZSB4MT0iMTEwIiB5MT0iMjAwIiB4Mj0iMjkwIiB5Mj0iMjAwIiBzdHJva2U9IiNhMjJiMmIiIHN0cm9rZS13aWR0aD0iMyIgc3Ryb2tlLWRhc2hhcnJheT0iMTAgNSIvPgogICAgPGxpbmUgeDE9IjExMCIgeTE9IjI4MCIgeDI9IjI5MCIgeTI9IjI4MCIgc3Ryb2tlPSIjYTIyYjJiIiBzdHJva2Utd2lkdGg9IjMiIHN0cm9rZS1kYXNoYXJyYXk9IjEwIDUiLz4KICAgIDxsaW5lIHgxPSIxMTAiIHkxPSIzNjAiIHgyPSIyOTAiIHkyPSIzNjAiIHN0cm9rZT0iI2EyMmIyYiIgc3Ryb2tlLXdpZHRoPSIzIiBzdHJva2UtZGFzaGFycmF5PSIxMCA1Ii8+CiAgICA8IS0tIGJvdHRvbSAtLT4KICAgIDxlbGxpcHNlIGN4PSIyMDAiIGN5PSI0NDAiIHJ4PSI5MCIgcnk9IjMwIiBmaWxsPSIjYTIyYjJiIiBzdHJva2U9IiM4YzE3MTciIHN0cm9rZS13aWR0aD0iNCIvPgogICAgPCEtLSBmYWNlIC0tPgogICAgPGNpcmNsZSBjeD0iMTYwIiBjeT0iMTgwIiByPSIxNSIgZmlsbD0iIzIyMiIvPgogICAgPGNpcmNsZSBjeD0iMjQwIiBjeT0iMTgwIiByPSIxNSIgZmlsbD0iIzIyMiIvPgogICAgPHBhdGggZD0iTTE2MCAyMzAgUTIwMCAyNjAgMjQwIDIzMCIgc3Ryb2tlPSIjMjIyIiBzdHJva2Utd2lkdGg9IjQiIGZpbGw9Im5vbmUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgo8L3N2Zz4=";
            sandbag.classList.remove('dizzy');
            winMask.style.display = 'none';
            updateUI();
        }

        // 打击音效（纯JS生成，不用外部文件）
        function playHitSound(isCrit) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // 暴击音效和普通音效区分
            if (isCrit) {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            } else {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
            }

            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
