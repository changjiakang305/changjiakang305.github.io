<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八六班专属小游戏平台</title>
    <!-- 引入公共CDN，无本地依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100vh;
            background: #0f172a;
        }
        /* 标题呼吸动画 */
        .title-breath {
            animation: breath 2s infinite ease-in-out;
        }
        @keyframes breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        /* 游戏卡片悬停效果 */
        .game-card {
            transition: all 0.3s ease;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(244, 63, 94, 0.4);
        }
        /* 加载动画 */
        .loading-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 渐变配色数组 */
        .gradient-0 { background: linear-gradient(135deg, #f43f5e, #ec4899); }
        .gradient-1 { background: linear-gradient(135deg, #ec4899, #a855f7); }
        .gradient-2 { background: linear-gradient(135deg, #8b5cf6, #3b82f6); }
        .gradient-3 { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
        .gradient-4 { background: linear-gradient(135deg, #10b981, #22c55e); }
        .gradient-5 { background: linear-gradient(135deg, #84cc16, #eab308); }
        .gradient-6 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    </style>
</head>
<body class="text-white font-sans">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 顶部大标题区域 -->
        <div class="title-breath text-center mb-12">
            <h1 class="text-3xl md:text-5xl font-bold text-rose-500 mb-3 leading-tight">
                爱在九一，乐在九一
            </h1>
            <h2 class="text-2xl md:text-4xl font-bold text-amber-400 mb-4">
                九一自创小游戏平台
            </h2>
            <p class="text-lg md:text-xl font-semibold text-emerald-400 mb-2">
                八六班专属
            </p>
            <p class="text-base md:text-lg font-medium text-white opacity-90">
                谁不服为班级上交五十元，我贪污四十九块九毛九！！！！
            </p>
        </div>

        <!-- 游戏列表区域 -->
        <div class="mb-10">
            <h3 class="text-2xl font-bold text-center text-blue-400 mb-8">
                <i class="fa-solid fa-gamepad mr-2"></i>班级小游戏合集
            </h3>

            <!-- 加载状态 -->
            <div id="loading" class="w-full py-20 text-center">
                <div class="loading-spin inline-block w-10 h-10 border-4 border-gray-600 border-t-rose-500 rounded-full mb-3"></div>
                <p class="text-gray-400">正在扫描游戏文件...</p>
            </div>

            <!-- 空状态（无游戏时显示） -->
            <div id="empty-state" class="w-full py-20 text-center hidden">
                <i class="fa-solid fa-folder-open text-5xl text-gray-600 mb-3"></i>
                <p class="text-gray-400 mb-2">暂无游戏文件</p>
                <p class="text-sm text-gray-500">请将.html格式的游戏文件上传到本仓库同一目录，刷新页面即可自动加载</p>
            </div>

            <!-- 游戏卡片网格 -->
            <div id="game-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 hidden"></div>
        </div>

        <!-- 底部固定提示 -->
        <div class="w-full text-center py-3 mt-20 bg-slate-800/50 rounded-lg text-gray-300 text-sm">
            看到这个网站除了L男其他的请别笑
        </div>
    </div>

    <script>
        // 配置项（无需修改，自动适配）
        const CONFIG = {
            excludeFiles: ['index.html'], // 排除的主文件
            gameSuffix: '.html', // 游戏文件后缀
            maxFallbackCount: 100 // 降级模式最大扫描数量
        };

        // 页面元素
        const elements = {
            loading: document.getElementById('loading'),
            emptyState: document.getElementById('empty-state'),
            gameGrid: document.getElementById('game-grid')
        };

        // 1. 解析当前GitHub仓库信息（自动获取）
        function getRepoInfo() {
            const host = window.location.hostname;
            const path = window.location.pathname;
            const pathParts = path.split('/').filter(Boolean);

            // 适配两种GitHub Pages域名
            if (host.endsWith('.github.io')) {
                const username = host.split('.')[0];
                // 根仓库：xxx.github.io
                if (pathParts.length === 0) {
                    return { username, repo: `${username}.github.io` };
                }
                // 项目仓库：xxx.github.io/仓库名
                else {
                    return { username, repo: pathParts[0] };
                }
            }
            // 本地测试/自定义域名，返回null触发降级模式
            return null;
        }

        // 2. 通过GitHub API获取仓库根目录所有文件（核心功能）
        async function getGameFilesFromAPI() {
            const repoInfo = getRepoInfo();
            if (!repoInfo) return null;

            try {
                const apiUrl = `https://api.github.com/repos/${repoInfo.username}/${repoInfo.repo}/contents/`;
                const res = await fetch(apiUrl);
                if (!res.ok) return null;

                const fileList = await res.json();
                // 过滤：仅保留.html后缀、不在排除列表里的文件
                const gameFiles = fileList.filter(file => {
                    return file.name.toLowerCase().endsWith(CONFIG.gameSuffix)
                        && !CONFIG.excludeFiles.includes(file.name.toLowerCase());
                });

                // 格式化数据
                return gameFiles.map(file => ({
                    name: file.name.replace(CONFIG.gameSuffix, ''), // 去掉.html后缀作为显示名称
                    url: file.name,
                    size: file.size
                }));
            } catch (e) {
                console.log('API获取失败，启用降级模式', e);
                return null;
            }
        }

        // 3. 降级模式：按数字顺序扫描index1.html、index2.html...（本地测试/API失败时使用）
        async function getGameFilesFallback() {
            const gameList = [];
            for (let i = 1; i <= CONFIG.maxFallbackCount; i++) {
                const fileName = `index${i}${CONFIG.gameSuffix}`;
                try {
                    const res = await fetch(fileName, { method: 'HEAD' });
                    if (res.ok) {
                        gameList.push({
                            name: `游戏 ${i}`,
                            url: fileName
                        });
                    } else {
                        break; // 遇到不存在的文件停止扫描
                    }
                } catch (e) {
                    break;
                }
            }
            return gameList;
        }

        // 4. 渲染游戏列表
        function renderGameList(gameList) {
            elements.loading.classList.add('hidden');
            if (gameList.length === 0) {
                elements.emptyState.classList.remove('hidden');
                return;
            }

            // 生成卡片HTML，自动循环渐变配色
            elements.gameGrid.innerHTML = gameList.map((game, index) => `
                <a href="${game.url}" target="_blank" class="game-card gradient-${index % 7} rounded-xl p-6 text-center block">
                    <i class="fa-solid fa-gamepad text-3xl mb-3"></i>
                    <p class="text-xl font-bold break-all">${game.name}</p>
                </a>
            `).join('');

            elements.gameGrid.classList.remove('hidden');
        }

        // 5. 页面加载时执行
        window.addEventListener('DOMContentLoaded', async () => {
            // 优先用GitHub API获取所有游戏文件
            let gameList = await getGameFilesFromAPI();
            // API失败时启用降级模式
            if (!gameList) {
                gameList = await getGameFilesFallback();
            }
            // 渲染页面
            renderGameList(gameList);
        });
    </script>
</body>
</html>
