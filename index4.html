<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狂扁猪头高健魁·修复版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", Arial, sans-serif;
        }
        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 游戏主容器 - 教室场景 */
        .game-box {
            width: 95vw;
            max-width: 900px;
            height: 90vh;
            max-height: 700px;
            background: linear-gradient(to bottom, #87CEEB 0%, #f0f0f0 100%);
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* 可互动元素高亮样式 */
        .interactive {
            cursor: pointer;
            transition: all 0.2s;
        }
        .interactive:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff3333;
        }
        /* 教室黑板 - 加明显边框，确保可见 */
        .blackboard {
            width: 80%;
            height: 35%;
            background: #264d32;
            position: absolute;
            top: 5%;
            left: 10%;
            border: 10px solid #8B4513;
            border-radius: 4px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        .blackboard-text {
            color: #fff;
            font-size: 24px;
            text-align: center;
            line-height: 150px;
            user-select: none;
        }
        /* 讲台 - 加明显样式 */
        .platform {
            width: 30%;
            height: 8%;
            background: #8B4513;
            position: absolute;
            top: 41%;
            left: 35%;
            border-radius: 4px;
            border: 4px solid #654321;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* 教室后门 - 加明显样式 */
        .back-door {
            width: 12%;
            height: 40%;
            background: #654321;
            position: absolute;
            top: 30%;
            right: 2%;
            border-radius: 4px;
            border: 4px solid #4a3217;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .door-window {
            width: 80%;
            height: 30%;
            background: #add8e6;
            margin: 10% auto 0;
            border: 3px solid #333;
        }
        /* 课桌 - 加明显样式 */
        .desk {
            width: 300px;
            height: 120px;
            background: #deb887;
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
            border: 6px solid #8B4513;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        /* 纯CSS绘制 猪头高健魁 - 彻底不用外部图片！ */
        #boss {
            width: 200px;
            height: 220px;
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            z-index: 10;
        }
        /* 猪头主体 */
        .pig-head {
            width: 180px;
            height: 180px;
            background: #ffb6c1;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 10px;
            border: 4px solid #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* 猪耳朵 */
        .pig-ear {
            width: 60px;
            height: 80px;
            background: #ffb6c1;
            border: 4px solid #000;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: 0;
        }
        .ear-left { left: 0; transform: rotate(-20deg); }
        .ear-right { right: 0; transform: rotate(20deg); }
        .ear-inner {
            width: 30px;
            height: 40px;
            background: #ff8fa3;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: 15px;
            left: 10px;
        }
        /* 猪眼睛 */
        .pig-eye {
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            animation: eyeBlink 3s infinite;
        }
        .eye-left { left: 40px; }
        .eye-right { right: 40px; }
        @keyframes eyeBlink {
            0%, 95%, 100% { height: 20px; }
            97% { height: 2px; }
        }
        /* 猪鼻子 */
        .pig-nose {
            width: 80px;
            height: 60px;
            background: #ff8fa3;
            border: 4px solid #000;
            border-radius: 50%;
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
        }
        .nose-hole {
            width: 15px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 15px;
        }
        .nose-left { left: 15px; }
        .nose-right { right: 15px; }
        /* 猪嘴 */
        .pig-mouth {
            width: 60px;
            height: 20px;
            border-bottom: 4px solid #000;
            border-radius: 0 0 50% 50%;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* 睡觉zzz */
        .sleep-zzz {
            position: absolute;
            top: -30px;
            right: -20px;
            color: #333;
            font-size: 20px;
            font-weight: bold;
            animation: zzzFloat 2s infinite;
            opacity: 0;
        }
        @keyframes zzzFloat {
            0% { transform: translateY(0); opacity: 0; }
            50% { transform: translateY(-10px); opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
        /* 受伤动画 */
        .boss-hurt {
            transform: translateX(-50%) scale(0.9) rotate(-5deg) !important;
            filter: brightness(0.6);
        }
        .boss-hurt .pig-mouth {
            border-bottom: none;
            border-top: 4px solid #000;
        }
        /* 睡觉动画 */
        .boss-sleep {
            transform: translateX(-50%) translateY(5px) !important;
        }
        /* 血条 */
        .hp-container {
            width: 90%;
            height: 32px;
            background: #444;
            position: absolute;
            top: 15px;
            left: 5%;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #000;
        }
        #hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, #ff3333, #ff6666);
            transition: width 0.2s ease;
        }
        .hp-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 28px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 2px #000;
            font-size: 18px;
        }
        /* 能量条 */
        .energy-container {
            width: 70%;
            height: 20px;
            background: #333;
            position: absolute;
            top: 55px;
            left: 15%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #000;
        }
        #energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #0066ff, #00ccff);
            transition: width 0.2s ease;
        }
        /* 连击提示 */
        #combo-text {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #fffc00;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 0 4px #000;
        }
        /* 点击次数提示 */
        #click-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 998;
        }
        /* 彩蛋解锁全屏提示 */
        #egg-unlock-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #ff0000, #ffcc00);
            color: #fff;
            padding: 30px 60px;
            border-radius: 20px;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 30px #ffcc00;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            animation: eggBlink 0.5s infinite alternate;
            border: 4px solid #000;
        }
        @keyframes eggBlink {
            from { box-shadow: 0 0 30px #ffcc00; }
            to { box-shadow: 0 0 60px #ffff00; }
        }
        /* 按钮 */
        .btn {
            padding: 12px 28px;
            background: #ff4444;
            color: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #ff2222;
            transform: translateX(-50%) scale(1.05);
        }
        #skill-btn {
            left: 80%;
            display: none;
            background: #0066ff;
        }
        #skill-btn:hover {
            background: #0044cc;
        }
        #book-btn {
            left: 20%;
            background: #22aa22;
        }
        #book-btn:hover {
            background: #118811;
        }
        #guide-btn {
            left: 5%;
            background: #aa6600;
        }
        #guide-btn:hover {
            background: #884400;
        }
        /* 垃圾桶 - 加明显样式 */
        .trash {
            width: 60px;
            height: 80px;
            background: #333;
            position: absolute;
            bottom: 15%;
            left: 5%;
            border-radius: 4px;
            border: 3px solid #000;
        }
        /* 时钟 - 加明显样式 */
        .clock {
            width: 60px;
            height: 60px;
            background: #fff;
            border: 4px solid #000;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 5%;
        }
        .clock-hand {
            width: 2px;
            height: 20px;
            background: #000;
            position: absolute;
            top: 10px;
            left: 50%;
            transform-origin: bottom center;
            animation: clockRotate 10s linear infinite;
        }
        @keyframes clockRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 开始界面 */
        #start-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        #start-title {
            font-size: 52px;
            color: #fff;
            text-shadow: 0 0 15px #ff3333;
            user-select: none;
            cursor: pointer;
            text-align: center;
        }
        /* 开始界面小纯CSS猪头 */
        .start-pig {
            width: 150px;
            height: 150px;
            position: relative;
        }
        #start-btn {
            padding: 18px 50px;
            font-size: 28px;
            background: #ff4444;
            color: #fff;
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        #start-btn:hover {
            background: #ff2222;
            transform: scale(1.05);
        }
        .egg-progress {
            color: #fff;
            font-size: 18px;
        }
        .key-tip {
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
        /* 结束界面 */
        #end-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        #end-title {
            font-size: 48px;
            color: #ff3333;
            text-align: center;
        }
        /* 彩蛋图鉴 */
        #egg-book {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1001;
            display: none;
            padding: 30px;
            overflow-y: auto;
        }
        .egg-item {
            padding: 15px;
            margin: 10px 0;
            background: #222;
            border-radius: 8px;
            color: #fff;
            border-left: 5px solid #666;
            border: 2px solid #000;
        }
        .egg-unlock {
            border-left: 5px solid #0f0;
            color: #0f0;
        }
        .egg-lock {
            border-left: 5px solid #666;
            color: #aaa;
        }
        #close-book {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff4444;
            color: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        /* 彩蛋指引高亮 */
        .guide-highlight {
            animation: guideBlink 0.5s infinite alternate;
        }
        @keyframes guideBlink {
            from { box-shadow: 0 0 20px #ffff00; }
            to { box-shadow: 0 0 40px #ff0000; }
        }
    </style>
</head>
<body>
    <div class="game-box">
        <!-- 开始界面 -->
        <div id="start-menu">
            <div class="start-pig">
                <div class="pig-head">
                    <div class="pig-ear ear-left"><div class="ear-inner"></div></div>
                    <div class="pig-ear ear-right"><div class="ear-inner"></div></div>
                    <div class="pig-eye eye-left"></div>
                    <div class="pig-eye eye-right"></div>
                    <div class="pig-nose">
                        <div class="nose-hole nose-left"></div>
                        <div class="nose-hole nose-right"></div>
                    </div>
                    <div class="pig-mouth"></div>
                </div>
            </div>
            <h1 id="start-title">狂扁猪头高健魁</h1>
            <div class="egg-progress" id="egg-progress">已解锁彩蛋：0/30</div>
            <button id="start-btn">开始揍猪</button>
            <p class="key-tip">彩蛋指引：所有鼠标放上去变红框的地方都能点！<br>键盘输入拼音首字母可触发专属彩蛋</p>
        </div>

        <!-- 结束界面 -->
        <div id="end-menu">
            <div class="start-pig">
                <div class="pig-head" style="filter: grayscale(1);">
                    <div class="pig-ear ear-left"><div class="ear-inner"></div></div>
                    <div class="pig-ear ear-right"><div class="ear-inner"></div></div>
                    <div class="pig-eye eye-left"></div>
                    <div class="pig-eye eye-right"></div>
                    <div class="pig-nose">
                        <div class="nose-hole nose-left"></div>
                        <div class="nose-hole nose-right"></div>
                    </div>
                    <div class="pig-mouth"></div>
                </div>
            </div>
            <h1 id="end-title">猪头高健魁被你揍趴下了！</h1>
            <p id="end-desc" style="color: #fff; font-size: 18px;"></p>
            <button class="btn" id="restart-btn">再来一局</button>
        </div>

        <!-- 彩蛋图鉴 -->
        <div id="egg-book">
            <button id="close-book">关闭图鉴</button>
            <h2 style="color: #fff; text-align: center; margin-bottom: 20px;">彩蛋图鉴</h2>
            <div id="egg-list"></div>
        </div>

        <!-- 教室场景元素（全加了interactive类，hover高亮提示可点击） -->
        <div class="blackboard interactive" id="blackboard">
            <div class="blackboard-text">高中数学 必修五</div>
        </div>
        <div class="platform interactive" id="platform"></div>
        <div class="back-door interactive" id="back-door">
            <div class="door-window interactive" id="door-window"></div>
        </div>
        <div class="desk interactive" id="desk"></div>
        <div class="trash interactive" id="trash"></div>
        <div class="clock interactive" id="clock">
            <div class="clock-hand"></div>
        </div>

        <!-- 状态条 -->
        <div class="hp-container">
            <div id="hp-bar"></div>
            <div class="hp-text">猪头高健魁血量：100%</div>
        </div>
        <div class="energy-container">
            <div id="energy-bar"></div>
        </div>
        <div id="combo-text">×0 连击！</div>
        <div id="click-tip"></div>
        <div id="egg-unlock-tip"></div>

        <!-- BOSS 纯CSS猪头高健魁 -->
        <div id="boss" class="interactive">
            <div class="pig-head">
                <div class="pig-ear ear-left"><div class="ear-inner"></div></div>
                <div class="pig-ear ear-right"><div class="ear-inner"></div></div>
                <div class="pig-eye eye-left"></div>
                <div class="pig-eye eye-right"></div>
                <div class="pig-nose">
                    <div class="nose-hole nose-left"></div>
                    <div class="nose-hole nose-right"></div>
                </div>
                <div class="pig-mouth"></div>
            </div>
            <div class="sleep-zzz" id="zzz">zzz</div>
        </div>

        <!-- 按钮 -->
        <button class="btn" id="skill-btn">班主任制裁</button>
        <button class="btn" id="book-btn">彩蛋图鉴</button>
        <button class="btn" id="guide-btn">彩蛋指引</button>
    </div>

    <script>
        // 游戏核心数据
        const gameData = {
            bossHp: 100,
            maxHp: 100,
            energy: 0,
            maxEnergy: 100,
            combo: 0,
            comboTimer: null,
            isGameStart: false,
            isGameOver: false,
            isGodMode: false,
            unlockEggs: JSON.parse(localStorage.getItem('pig_gjk_eggs') || '[]'),
            eggCount: 30,
            thisGameEggs: 0,
            isPeace: true,
            // 彩蛋列表（全给明确触发方式）
            eggList: [
                { id: 1, name: "标题迫害者", desc: "连续点击开始界面的「狂扁猪头高健魁」标题3次解锁", unlock: false },
                { id: 2, name: "班主任警告", desc: "鼠标悬停「开始揍猪」按钮5秒解锁", unlock: false },

                { id: 7, name: "下课铃狂喜", desc: "连续点击时钟5次解锁", unlock: false },
                { id: 8, name: "课桌掀翻", desc: "连续点击高健魁面前的课桌5次解锁", unlock: false },
                { id: 9, name: "罚抄手速王", desc: "1秒内点击猪头5次解锁", unlock: false },
                { id: 10, name: "连击狂魔", desc: "打出20连击不中断解锁", unlock: false },
                { id: 11, name: "猪鼻子暴击", desc: "连续点击猪头的鼻子5次解锁", unlock: false },
                { id: 12, name: "猪耳朵嘲讽", desc: "连续点击猪头的耳朵3次解锁", unlock: false },

                { id: 18, name: "班主任来了", desc: "游戏内按键盘「BZRL」四个字母解锁", unlock: false },
                { id: 19, name: "作业没写暴击", desc: "游戏内按键盘「ZYMX」四个字母解锁", unlock: false },
                { id: 20, name: "篮球舞罚站", desc: "游戏内按键盘「JNTM」四个字母解锁", unlock: false },
                { id: 21, name: "干饭人奥利给", desc: "游戏内按键盘「OLG」三个字母解锁", unlock: false },
                { id: 22, name: "退退退大法", desc: "游戏内按键盘「TTT」三个字母解锁", unlock: false },
                { id: 23, name: "上帝模式", desc: "开始界面按顺序按「上上下下左右左右BABA」解锁", unlock: false },
                { id: 24, name: "终极和平结局", desc: "同时解锁「和平摸鱼人」和「饶猪一命」后通关解锁", unlock: false },
                { id: 25, name: "迫害之王", desc: "单局游戏内解锁10个以上彩蛋通关解锁", unlock: false },
                { id: 26, name: "图鉴收藏家", desc: "累计解锁20个以上彩蛋解锁", unlock: false },

        // 纯JS内置音效，不用外部资源
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'oink') { // 猪叫
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'ding') { // 解锁成就
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.5);
            } else if (type === 'click') { // 点击音效
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            }
        }

        // 解锁彩蛋函数
        function unlockEgg(eggId, extraTip) {
            const egg = gameData.eggList.find(e => e.id === eggId);
            if (egg && !egg.unlock) {
                // 标记解锁
                egg.unlock = true;
                gameData.unlockEggs.push(eggId);
                gameData.thisGameEggs = (gameData.thisGameEggs || 0) + 1;
                localStorage.setItem('pig_gjk_eggs', JSON.stringify(gameData.unlockEggs));
                
                // 音效
                playSound('ding');

                // 全屏大字提示
                dom.eggUnlockTip.innerText = `🎉 解锁彩蛋：${egg.name}！\n${extraTip || ''}`;
                dom.eggUnlockTip.style.opacity = 1;
                setTimeout(() => {

                }, 2500);

                // 更新进度
                updateEggProgress();

                // 连锁解锁
                const unlockCount = gameData.eggList.filter(e => e.unlock).length;
                if (unlockCount >= 20 && !gameData.eggList.find(e => e.id === 26).unlock) {
                    unlockEgg(26, "获得永久攻击翻倍buff！");

                if (unlockCount >= 29 && !gameData.eggList.find(e => e.id === 30).unlock) {

        function updateGame() {

            dom.hpBar.style.width = `${hpPercent}%`;
            dom.hpText.innerText = `猪头高健魁血量：${Math.max(0, Math.ceil(gameData.bossHp))}%`;
            // 更新能量条

            dom.energyBar.style.width = `${energyPercent}%`;
            // 大招按钮显示
            dom.skillBtn.style.display = gameData.energy >= gameData.maxEnergy ? 'block' : 'none';
            // 游戏结束判断
            if (gameData.bossHp <= 0 && !gameData.isGameOver) {
                gameOver(true);
            }
            // 饶猪一命彩蛋判断
            if (gameData.bossHp < 10 && gameData.isGameStart && !gameData.isGameOver && !gameData.eggList.find(e => e.id === 15).unlock) {

                updateGame();
            }

            // 19. 作业没写 ZYMX
            if (keyHistory.slice(-4).join('') === 'zymx' && gameData.isGameStart) {
                unlockEgg(19, "作业没写被抓！一堆作业砸中猪头！");
                gameData.bossHp -= 15;
                updateGame();
            }

            // 20. 鸡你太美 JNTM
            if (keyHistory.slice(-4).join('') === 'jntm' && gameData.isGameStart) {
                unlockEgg(20, "猪头跳篮球舞，无法攻击5秒！");
                gameData.bossHp -= 10;
                updateGame();
            }

            // 21. 奥利给 OLG
            if (keyHistory.slice(-3).join('') === 'olg' && gameData.isGameStart) {
                unlockEgg(21, "能量直接拉满，大招解锁！");
                gameData.energy = 100;
                updateGame();
            }

            // 22. 退退退大法
            if (keyHistory.slice(-3).join('') === 'ttt' && gameData.isGameStart) {
                unlockEgg(22, "退退退！猪头被推到墙角僵直5秒！");
                gameData.bossHp -= 12;
                updateGame();
            }
        });
    </script>
